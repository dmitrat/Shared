name: Pack

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to pack (name equals .csproj filename without extension)'
        required: true
        type: choice
        options:
          - OutWit.Shared.Email.Providers
          - OutWit.Shared.Email.Provider.Null
          - OutWit.Shared.Email.Provider.Smtp
          - OutWit.Shared.Email.Provider.Resend
          - OutWit.Shared.Logging.Blazor
          - OutWit.Shared.Logging.Providers
          - OutWit.Shared.Logging.Provider.File
          - OutWit.Shared.Logging.Provider.NewRelic
          - OutWit.Shared.Logging.Provider.Loki
          - OutWit.Shared.Blazor.Shell

permissions:
  contents: read

jobs:
  pack:
    runs-on: windows-latest
    env:
      PROJECT: ${{ github.event.inputs.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDKs (6/7/8/9/10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.slnx', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore slnx
        run: dotnet restore OutWit.slnx

      - name: Resolve project path
        id: paths
        shell: pwsh
        run: |
          $projName = '${{ env.PROJECT }}'
          $lib = Get-ChildItem -Recurse -Filter "$projName.csproj" | Select-Object -Expand FullName -First 1
          if (!$lib) { Write-Error "Project $projName.csproj not found"; exit 1 }
          "libCsproj=$lib" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved: $lib"

      # Plugin packages (csproj with NuspecFile) embed a staging step that copies
      # the plugin module into @Plugins/<Config>/<key>.module/ during build.
      # Directory.Build.props supplies a SolutionDir fallback so single-csproj
      # builds also fire that target — the package's nuspec then finds the staged
      # files at pack time.
      - name: Build (Release)
        run: dotnet build "${{ steps.paths.outputs.libCsproj }}" --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Pack (no build)
        run: dotnet pack "${{ steps.paths.outputs.libCsproj }}" --configuration Release --no-build

      - name: Collect packages
        shell: pwsh
        run: |
          if (!(Test-Path "NuGet")) { New-Item -ItemType Directory -Force -Path "NuGet" | Out-Null }
          Get-ChildItem -Recurse -Include *.nupkg,*.snupkg -Path . |
            Where-Object { $_.FullName -match "\\bin\\Release\\" } |
            Copy-Item -Destination "NuGet" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ env.PROJECT }}
          path: NuGet/*
          if-no-files-found: error
